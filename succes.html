<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- ===== icons ===== -->
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

        <!-- ===== Swiper CSS ===== -->
        <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
                
        <!-- ===== Style CSS ===== -->
        <link rel="stylesheet" href="assets/css/style.css">

        <title>GOUTTENOIRE Lucas || Portfolio</title>   
    </head>
    <body>
        <!-- ===== Header ===== -->
        <header class="header" id="header">
            <nav class="nav container">
                <a href="#home" class="nav__logo">Lucas</a>

                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list grid">
                        <li class="nav__item">
                            <a href="#home" class="nav__link active-link">
                                <i class='bx bx-home-alt-2 nav__icon'></i> Accueil
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#about" class="nav__link">
                                <i class='bx bx-user nav__icon'></i> Profil
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#skills" class="nav__link">
                                <i class='bx bx-file nav__icon'></i> Compétences
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#services" class="nav__link">
                                <i class='bx bx-briefcase nav__icon'></i> Savoir-Faire
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#portfolio" class="nav__link">
                                <i class='bx bx-image nav__icon'></i> Épreuves
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#contact" class="nav__link">
                                <i class='bx bx-send nav__icon'></i> Contact
                            </a>
                        </li>
                    </ul>
                    <i class='bx bx-x nav__close' id="nav-close"></i>
                </div>

                <div class="nav__btns">
                    <!-- Theme Color -->
                    <i class='bx bx-palette color__button'></i> 
                    <div class="color__modal">
                        <div class="color__modal-content">
                            <h4 class="color__modal-title">Couleur du site</h4>
                            <i class='bx bx-x color__modal-close'></i>
                            <ul class="color__modal-services grid">
                                <li class="color__modal-service" data-color="0" id="red"></li>
                                <li class="color__modal-service" data-color="140" id="green"></li>
                                <li class="color__modal-service" data-color="220" id="blue"></li>
                                <li class="color__modal-service" data-color="250" id="violet"></li>
                                <li class="color__modal-service" data-color="290" id="pink"></li>
                            </ul>
                        </div>
                    </div>
                    <!-- Theme Blanc/Sombre -->
                    <i class='bx bx-moon change-theme' id="theme-button" ></i>
                    <!-- Show / Hide menu -->
                    <i class='bx bx-grid-alt nav__toggle' id="nav-toggle"></i>
                </div>
            </nav>
        </header>

        <!-- ===== Main ===== -->
        <main class="main">

            <!-- ===== Home ===== -->
            <section class="succes section">
               <h1>Envoye du mail confirmé</h1>
            </section>

        </main>

        <!-- ===== Footer ===== -->
        <footer class="footer">
            <div class="footer__bg">
                <p class="footer__copy">&#169; GOUTTENOIRE Lucas || Portfolio 2023</p>
            </div>
        </footer>

        <!-- ===== JavaScript Main ===== -->
        <script src="assets/js/main.js"></script>
    </body>
</html>
